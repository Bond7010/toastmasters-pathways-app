<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Toastmasters Pathways</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Tier 1: Brand values (exact hex — do not approximate) ── */
    :root {
      --tm-loyal-blue:   #004165;
      --tm-true-maroon:  #772432;
      --tm-cool-gray:    #A9B2B1;
      --tm-happy-yellow: #F2DF74;
      --tm-white:        #FFFFFF;

      --tm-font-headline: 'Montserrat', 'Gotham', Arial, sans-serif;
      --tm-font-body:     'Source Sans 3', 'Segoe UI', Arial, sans-serif;

      /* Tier 2: Semantic intent */
      --color-header-bg:           var(--tm-loyal-blue);
      --color-header-text:         var(--tm-white);
      --color-selector-bg:         var(--tm-true-maroon);
      --color-selector-text:       var(--tm-white);
      --color-tab-active:          var(--tm-loyal-blue);
      --color-badge-required-bg:   var(--tm-loyal-blue);
      --color-badge-required-text: var(--tm-white);
      --color-badge-elective-bg:   var(--tm-happy-yellow);
      --color-badge-elective-text: #000000;

      /* Spacing scale (4px base) */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
    }

    /* ── Body grid: 4 zones, no body scroll ─────────────── */
    body {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      /* zones: top-bar | path-selector | tab-strip | content-area */
      height: 100dvh; /* NOT 100vh — iOS Safari address-bar clips with 100vh */
      overflow: hidden;
      margin: 0;
      font-family: var(--tm-font-body);
      font-size: 16px;
    }

    /* ── Zone 1: Top bar ─────────────────────────────────── */
    #top-bar {
      background: var(--color-header-bg);
      color: var(--color-header-text);
      padding: var(--space-3) var(--space-4);
      font-family: var(--tm-font-headline);
      font-size: 1.25rem;
      font-weight: 700;
    }

    /* ── Zone 2: Path selector ───────────────────────────── */
    #path-selector-zone {
      /* wrapper sets the zone; inner div handles the styling */
    }
    .path-selector-wrapper {
      position: relative;
      background: var(--color-selector-bg);
      padding: var(--space-2) var(--space-4);
    }
    .path-selector-wrapper::after {
      content: "▾";
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      pointer-events: none;
    }
    .path-selector {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      border: none;
      color: white;
      font-family: var(--tm-font-headline);
      font-size: 1rem;
      padding: var(--space-2) 0;
      cursor: pointer;
      outline-offset: 2px;
      min-height: 44px; /* ACCSS-02: minimum touch target */
    }
    /* Chromium/Edge: style the select options */
    .path-selector option {
      background: var(--tm-true-maroon);
      color: white;
    }

    /* ── Zone 3: Level tab strip ─────────────────────────── */
    #tab-strip {
      display: flex;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      scrollbar-width: none; /* Firefox */
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
    }
    #tab-strip::-webkit-scrollbar { display: none; }

    [role="tab"] {
      flex-shrink: 0;
      scroll-snap-align: start;
      white-space: nowrap;
      padding: var(--space-3) var(--space-4);
      min-height: 44px; /* ACCSS-02: minimum touch target */
      border: none;
      border-bottom: 3px solid transparent;
      background: transparent;
      cursor: pointer;
      font-family: var(--tm-font-headline);
      font-size: 0.875rem;
      color: #333;
    }
    [role="tab"][aria-selected="true"] {
      border-bottom-color: var(--color-tab-active);
      color: var(--tm-loyal-blue);
      font-weight: 700;
    }

    /* ── Zone 4: Content area (only this scrolls) ────────── */
    #content-area {
      overflow-y: auto;
      overscroll-behavior: contain;
      /* DO NOT add -webkit-overflow-scrolling: touch — deprecated iOS 13+ */
      padding: var(--space-4);
      background: #f9f9f9;
    }
    /* #content-pane: plain div that render() targets with innerHTML */

    /* ── Level header ────────────────────────────────────── */
    .level-header {
      margin-bottom: var(--space-4);
    }
    .level-name {
      font-family: var(--tm-font-headline);
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--tm-loyal-blue);
      margin: 0 0 var(--space-1) 0;
    }
    .level-completion-req {
      font-size: 0.9375rem;
      color: #555;
      margin: 0;
    }

    /* ── Enhancement section ─────────────────────────────── */
    .enhancement-section {
      background: white;
      border: 2px solid var(--tm-loyal-blue);
      border-radius: 6px;
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }
    .enhancement-title {
      font-family: var(--tm-font-headline);
      font-weight: 700;
      color: var(--tm-loyal-blue);
      margin: 0 0 var(--space-2) 0;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .enhancement-subtitle {
      font-size: 0.875rem;
      color: #555;
      margin: 0 0 var(--space-2) 0;
    }
    .enhancement-roles {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .enhancement-roles li {
      background: #e8eef2;
      color: var(--tm-loyal-blue);
      padding: var(--space-1) var(--space-3);
      border-radius: 3px;
      font-size: 0.875rem;
    }
    .enhancement-notes {
      margin: var(--space-2) 0 0 0;
      font-size: 0.875rem;
      color: #555;
      font-style: italic;
    }

    /* ── Project card ────────────────────────────────────── */
    .project-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: var(--space-4);
      margin-bottom: var(--space-3);
    }
    .project-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }
    .project-name {
      font-family: var(--tm-font-headline);
      font-weight: 700;
      font-size: 1rem;
      margin: 0;
    }
    .project-time {
      font-size: 0.875rem;
      color: #555;
      margin: var(--space-1) 0;
    }
    .project-purpose {
      font-size: 0.9375rem;
      color: #333;
      line-height: 1.5;
      margin: 0;
    }

    /* ── Badges ──────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: var(--space-1) var(--space-2);
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-required {
      background: var(--color-badge-required-bg);
      color: var(--color-badge-required-text);
    }
    .badge-elective {
      background: var(--color-badge-elective-bg);
      color: var(--color-badge-elective-text);
      /* NEVER use --tm-happy-yellow as text color on light bg — fails WCAG 1.4:1 */
    }

    /* ── FAB (Floating Action Button) ────────────────────── */
    #fab-scroll-top {
      position: fixed;
      bottom: calc(1.5rem + env(safe-area-inset-bottom));
      right: 1.5rem;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: var(--tm-loyal-blue);
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      z-index: 100;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #fab-scroll-top[hidden] { display: none; }

    /* ── Responsive: wider viewports ─────────────────────── */
    @media (min-width: 768px) {
      body {
        max-width: 900px;
        margin: 0 auto;
      }
      .project-card {
        padding: var(--space-6);
      }
    }

    /* ── Focus indicator (WCAG — never remove) ────────────── */
    :focus-visible {
      outline: 2px solid var(--tm-loyal-blue);
      outline-offset: 2px;
    }
  </style>
</head>

  <script>
    /* ── Data ──────────────────────────────────────────── */
    const DATA = JSON.parse(document.getElementById('pathways-data').text);
    const PATHWAYS = DATA.paths;

    /* ── State singleton ────────────────────────────────── */
    const state = {
      selectedPath: 'dynamic-leadership',
      selectedLevel: 0  /* 0-based index into levels[] */
    };

    function setState(updates) {
      Object.assign(state, updates);
      render();
    }

    /* ── Build functions ────────────────────────────────── */

    function buildProjectCardHTML(project, pathId, levelIndex, projectIndex) {
      const badgeClass = project.type === 'Required' ? 'badge-required' : 'badge-elective';
      const cardId = 'card-' + pathId + '-l' + levelIndex + '-p' + projectIndex;
      return '<div class="project-card" id="' + cardId + '">'
        + '<div class="project-card-header">'
        + '<h3 class="project-name">' + project.name + '</h3>'
        + '<span class="badge ' + badgeClass + '">' + project.type + '</span>'
        + '</div>'
        + '<p class="project-time">' + project.time + '</p>'
        + '<p class="project-purpose">' + project.purpose + '</p>'
        + '</div>';
    }

    function buildEnhancementHTML(enhancement, pathId, levelIndex) {
      if (!enhancement) return '';
      const rolesHTML = enhancement.roles
        .map(function(role) { return '<li>' + role + '</li>'; })
        .join('');
      const notesHTML = enhancement.notes
        ? '<p class="enhancement-notes">' + enhancement.notes + '</p>'
        : '';
      const titleId = 'enhancement-title-' + pathId + '-l' + levelIndex;
      return '<section class="enhancement-section" aria-labelledby="' + titleId + '">'
        + '<h3 class="enhancement-title" id="' + titleId + '">Enhancement</h3>'
        + '<p class="enhancement-subtitle">Complete these meeting roles during this level:</p>'
        + '<ul class="enhancement-roles">' + rolesHTML + '</ul>'
        + notesHTML
        + '</section>';
    }

    function buildLevelHTML(level, pathId, levelIndex) {
      const enhancementHTML = buildEnhancementHTML(level.enhancement, pathId, levelIndex);
      const cardsHTML = level.projects
        .map(function(project, i) { return buildProjectCardHTML(project, pathId, levelIndex, i); })
        .join('');
      return '<div class="level-header">'
        + '<h2 class="level-name">Level ' + level.level + ': ' + level.name + '</h2>'
        + '<p class="level-completion-req">' + level.completionRequirement + '</p>'
        + '</div>'
        + enhancementHTML
        + cardsHTML;
    }

    function buildTabsHTML(pathData) {
      return pathData.levels.map(function(level, i) {
        const tabId = 'tab-' + pathData.id + '-l' + i;
        const isActive = i === state.selectedLevel;
        return '<button role="tab"'
          + ' id="' + tabId + '"'
          + ' aria-selected="' + (isActive ? 'true' : 'false') + '"'
          + ' tabindex="' + (isActive ? '0' : '-1') + '"'
          + ' aria-controls="content-pane"'
          + ' data-level-index="' + i + '">'
          + 'Level ' + level.level
          + '</button>';
      }).join('');
    }

    /* ── render(): reads state, writes to DOM once ─────── */
    function render() {
      const pathData = PATHWAYS.find(function(p) { return p.id === state.selectedPath; });
      if (!pathData) return;

      const level = pathData.levels[state.selectedLevel];
      if (!level) return;

      /* Rebuild tab strip (handles path changes) */
      document.getElementById('tab-strip').innerHTML = buildTabsHTML(pathData);

      /* Write content (single innerHTML assignment — render-on-demand) */
      const contentPane = document.getElementById('content-pane');
      contentPane.innerHTML = buildLevelHTML(level, state.selectedPath, state.selectedLevel);

      /* Update panel ARIA: labelledby must point to the active tab */
      const activeTabId = 'tab-' + state.selectedPath + '-l' + state.selectedLevel;
      contentPane.setAttribute('aria-labelledby', activeTabId);
    }

    /* ── Initial render on page load ─────────────────────── */
    render();

    /* ── Populate path selector from data ────────────────── */
    (function populatePathSelector() {
      const selector = document.getElementById('path-selector');
      selector.innerHTML = PATHWAYS.map(function(p) {
        return '<option value="' + p.id + '"'
          + (p.id === state.selectedPath ? ' selected' : '')
          + '>' + p.name + '</option>';
      }).join('');
    })();

    /* ── Event: path selector change ────────────────────── */
    document.getElementById('path-selector').addEventListener('change', function(e) {
      /* Validate: only accept known path IDs (T-03-02) */
      if (!PATHWAYS.find(function(p) { return p.id === e.target.value; })) return;
      setState({ selectedPath: e.target.value, selectedLevel: 0 });
      /* selectedLevel resets to 0 (Level 1) on every path change — NAV-05 */
    });

    /* ── Event: tab click delegation on stable parent ────── */
    document.getElementById('tab-strip').addEventListener('click', function(e) {
      const tab = e.target.closest('[role="tab"]');
      if (!tab) return;
      const levelIndex = parseInt(tab.dataset.levelIndex, 10);
      /* Bounds check (T-03-01) */
      const pathData = PATHWAYS.find(function(p) { return p.id === state.selectedPath; });
      if (!pathData || levelIndex < 0 || levelIndex >= pathData.levels.length) return;
      if (levelIndex === state.selectedLevel) return; /* already active — no re-render */
      setState({ selectedLevel: levelIndex });
      /* render() just rebuilt the tab strip via innerHTML — the old `tab` node is detached.
         Query for the newly created tab element and focus it. */
      var newTab = document.getElementById('tab-' + state.selectedPath + '-l' + levelIndex);
      if (newTab) newTab.focus();
    });

    /* ── Event: keyboard navigation — W3C APG manual activation ── */
    document.getElementById('tab-strip').addEventListener('keydown', function(e) {
      const tabs = Array.from(document.querySelectorAll('#tab-strip [role="tab"]'));
      const currentIndex = tabs.indexOf(document.activeElement);
      if (currentIndex === -1) return; /* focus not on a tab */

      let newIndex = currentIndex;

      switch (e.key) {
        case 'ArrowRight':
          newIndex = (currentIndex + 1) % tabs.length;
          e.preventDefault();
          break;
        case 'ArrowLeft':
          newIndex = (currentIndex - 1 + tabs.length) % tabs.length;
          e.preventDefault();
          break;
        case 'Home':
          newIndex = 0;
          e.preventDefault();
          break;
        case 'End':
          newIndex = tabs.length - 1;
          e.preventDefault();
          break;
        case 'Enter':
        case ' ': {
          /* Activate the currently focused tab (manual activation pattern) */
          var activeLevelIndex = parseInt(tabs[currentIndex].dataset.levelIndex, 10);
          setState({ selectedLevel: activeLevelIndex });
          /* render() rebuilt the tab strip; refocus the now-active tab element */
          var activatedTab = document.getElementById('tab-' + state.selectedPath + '-l' + activeLevelIndex);
          if (activatedTab) activatedTab.focus();
          e.preventDefault();
          return; /* focus stays on the activated tab */
        }
        default:
          return; /* let other keys propagate */
      }

      /* Move focus to new tab — does NOT activate it (manual activation) */
      tabs[newIndex].focus();
      /* Scroll the tab into view within the horizontal tab strip */
      tabs[newIndex].scrollIntoView({ block: 'nearest', inline: 'nearest' });
    });

    /* ── FAB: IntersectionObserver + click ───────────────── */
    (function initFAB() {
      const sentinel = document.getElementById('scroll-sentinel');
      const fab = document.getElementById('fab-scroll-top');
      const contentArea = document.getElementById('content-area');

      if (!sentinel || !fab || !contentArea) return;

      const observer = new IntersectionObserver(function(entries) {
        /* hidden=true when sentinel is visible (near top) → FAB not needed */
        /* hidden=false when sentinel scrolls out of view → show FAB */
        fab.hidden = entries[0].isIntersecting;
      }, { root: contentArea, threshold: 0 });

      observer.observe(sentinel);

      fab.addEventListener('click', function() {
        contentArea.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>
</body>
</html>
