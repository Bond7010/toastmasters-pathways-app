<style>
  /* ── App container — scopes all tokens and styles ─────── */
  #pathways-app {
    /* Tier 1: Brand values */
    --tm-loyal-blue:   #004165;
    --tm-true-maroon:  #772432;
    --tm-cool-gray:    #A9B2B1;
    --tm-happy-yellow: #F2DF74;
    --tm-white:        #FFFFFF;
    --tm-font-headline: 'Montserrat', 'Gotham', Arial, sans-serif;
    --tm-font-body:     'Source Sans 3', 'Segoe UI', Arial, sans-serif;

    /* Tier 2: Semantic intent */
    --color-header-bg:           var(--tm-loyal-blue);
    --color-header-text:         var(--tm-white);
    --color-selector-bg:         var(--tm-true-maroon);
    --color-tab-active:          var(--tm-loyal-blue);
    --color-badge-required-bg:   var(--tm-loyal-blue);
    --color-badge-required-text: var(--tm-white);
    --color-badge-elective-bg:   var(--tm-happy-yellow);
    --color-badge-elective-text: #000000;

    /* Spacing scale (4px base) */
    --space-1: 0.25rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-6: 1.5rem;
    --space-8: 2rem;

    font-family: var(--tm-font-body);
    font-size: 16px;
    width: 100%;
  }
  #pathways-app *,
  #pathways-app *::before,
  #pathways-app *::after { box-sizing: border-box; }

  /* ── Top bar ─────────────────────────────────────────── */
  #pathways-app .pa-top-bar {
    background: var(--color-header-bg);
    color: var(--color-header-text);
    padding: var(--space-3) var(--space-4);
    font-family: var(--tm-font-headline);
    font-size: 1.25rem;
    font-weight: 700;
  }

  /* ── Path selector ───────────────────────────────────── */
  #pathways-app .pa-selector-wrapper {
    position: relative;
    background: var(--color-selector-bg);
    padding: var(--space-2) var(--space-4);
  }
  #pathways-app .pa-selector-wrapper::after {
    content: "▾";
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    pointer-events: none;
  }
  #pathways-app .pa-path-selector {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
    border: none;
    color: white;
    font-family: var(--tm-font-headline);
    font-size: 1rem;
    padding: var(--space-2) 0;
    cursor: pointer;
    outline-offset: 2px;
    min-height: 44px;
  }
  #pathways-app .pa-path-selector option {
    background: var(--tm-true-maroon);
    color: white;
  }

  /* ── Tab strip: wraps vertically, no horizontal scroll ── */
  #pathways-app .pa-tab-strip {
    display: flex;
    flex-wrap: wrap;
    background: #f5f5f5;
    border-bottom: 2px solid #ddd;
  }
  #pathways-app [role="tab"] {
    flex: 1 1 auto;
    min-width: 64px;
    white-space: nowrap;
    padding: var(--space-2) var(--space-3);
    min-height: 44px;
    border: none;
    border-bottom: 3px solid transparent;
    background: transparent;
    cursor: pointer;
    font-family: var(--tm-font-headline);
    font-size: 0.875rem;
    color: #555;
    text-align: center;
  }
  #pathways-app [role="tab"][aria-selected="true"] {
    border-bottom-color: var(--color-tab-active);
    color: var(--tm-loyal-blue);
    font-weight: 700;
    background: white;
  }

  /* ── Content area (flows with FTH page scroll) ────────── */
  #pathways-app .pa-content {
    padding: var(--space-4);
    background: #f9f9f9;
  }

  /* ── Level section wrapper (all levels rendered, stacked) */
  #pathways-app .level-section {
    padding-bottom: var(--space-6);
    margin-bottom: var(--space-8);
    border-bottom: 2px solid #e0e0e0;
    scroll-margin-top: var(--space-2); /* offset for tab strip when scrolled to */
  }
  #pathways-app .level-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
  }

  /* ── Level header ────────────────────────────────────── */
  #pathways-app .level-header { margin-bottom: var(--space-4); }
  #pathways-app .level-name {
    font-family: var(--tm-font-headline);
    font-weight: 700;
    font-size: 1.25rem;
    color: var(--tm-loyal-blue);
    margin: 0 0 var(--space-1) 0;
  }
  #pathways-app .level-completion-req {
    font-size: 0.9375rem;
    color: #555;
    margin: 0;
  }

  /* ── Enhancement section ─────────────────────────────── */
  #pathways-app .enhancement-section {
    background: white;
    border: 2px solid var(--tm-loyal-blue);
    border-radius: 6px;
    padding: var(--space-4);
    margin-bottom: var(--space-4);
  }
  #pathways-app .enhancement-title {
    font-family: var(--tm-font-headline);
    font-weight: 700;
    color: var(--tm-loyal-blue);
    margin: 0 0 var(--space-2) 0;
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #pathways-app .enhancement-subtitle {
    font-size: 0.875rem;
    color: #555;
    margin: 0 0 var(--space-2) 0;
  }
  #pathways-app .enhancement-roles {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }
  #pathways-app .enhancement-roles li {
    background: #e8eef2;
    color: var(--tm-loyal-blue);
    padding: var(--space-1) var(--space-3);
    border-radius: 3px;
    font-size: 0.875rem;
  }
  #pathways-app .enhancement-notes {
    margin: var(--space-2) 0 0 0;
    font-size: 0.875rem;
    color: #555;
    font-style: italic;
  }

  /* ── Project card ────────────────────────────────────── */
  #pathways-app .project-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: var(--space-4);
    margin-bottom: var(--space-3);
  }
  #pathways-app .project-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-2);
    margin-bottom: var(--space-2);
  }
  #pathways-app .project-name {
    font-family: var(--tm-font-headline);
    font-weight: 700;
    font-size: 1rem;
    margin: 0;
  }
  #pathways-app .project-time {
    font-size: 0.875rem;
    color: #555;
    margin: var(--space-1) 0;
  }
  #pathways-app .project-purpose {
    font-size: 0.9375rem;
    color: #333;
    line-height: 1.5;
    margin: 0;
  }

  /* ── Badges ──────────────────────────────────────────── */
  #pathways-app .badge {
    display: inline-block;
    padding: var(--space-1) var(--space-2);
    border-radius: 3px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #pathways-app .badge-required {
    background: var(--color-badge-required-bg);
    color: var(--color-badge-required-text);
  }
  #pathways-app .badge-elective {
    background: var(--color-badge-elective-bg);
    color: var(--color-badge-elective-text);
    /* NEVER use --tm-happy-yellow as text color on light bg — fails WCAG 1.4:1 */
  }

  /* ── FAB — viewport-fixed, outside #pathways-app ─────── */
  #pathways-fab {
    position: fixed;
    bottom: calc(1.5rem + env(safe-area-inset-bottom));
    right: 1.5rem;
    width: 3rem;
    height: 3rem;
    border-radius: 50%;
    background: #004165; /* --tm-loyal-blue: literal since outside scoped container */
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    z-index: 9999;
    font-size: 1.5rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  #pathways-fab[hidden] { display: none; }

  /* ── Focus indicator (WCAG) ──────────────────────────── */
  #pathways-app :focus-visible {
    outline: 2px solid var(--tm-loyal-blue);
    outline-offset: 2px;
  }
</style>

<script>
  /* ── Data ────────────────────────────────────────────── */
  var _pd = JSON.parse(document.getElementById('pathways-data').text);
  var PATHWAYS = _pd.paths;

  /* ── State ───────────────────────────────────────────── */
  var state = {
    selectedPath: 'dynamic-leadership',
    selectedLevel: 0
  };

  function setState(updates) {
    Object.assign(state, updates);
    render();
  }

  /* ── Build functions ─────────────────────────────────── */

  function buildProjectCardHTML(project, pathId, levelIndex, projectIndex) {
    var badgeClass = project.type === 'Required' ? 'badge-required' : 'badge-elective';
    var cardId = 'card-' + pathId + '-l' + levelIndex + '-p' + projectIndex;
    return '<div class="project-card" id="' + cardId + '">'
      + '<div class="project-card-header">'
      + '<h3 class="project-name">' + project.name + '</h3>'
      + '<span class="badge ' + badgeClass + '">' + project.type + '</span>'
      + '</div>'
      + '<p class="project-time">' + project.time + '</p>'
      + '<p class="project-purpose">' + project.purpose + '</p>'
      + '</div>';
  }

  function buildEnhancementHTML(enhancement, pathId, levelIndex) {
    if (!enhancement) return '';
    var rolesHTML = enhancement.roles
      .map(function(r) { return '<li>' + r + '</li>'; })
      .join('');
    var notesHTML = enhancement.notes
      ? '<p class="enhancement-notes">' + enhancement.notes + '</p>'
      : '';
    var titleId = 'enhancement-title-' + pathId + '-l' + levelIndex;
    return '<section class="enhancement-section" aria-labelledby="' + titleId + '">'
      + '<h3 class="enhancement-title" id="' + titleId + '">Enhancement</h3>'
      + '<p class="enhancement-subtitle">Complete these meeting roles during this level:</p>'
      + '<ul class="enhancement-roles">' + rolesHTML + '</ul>'
      + notesHTML
      + '</section>';
  }

  function buildLevelHTML(level, pathId, levelIndex) {
    var enhHTML = buildEnhancementHTML(level.enhancement, pathId, levelIndex);
    var cardsHTML = level.projects
      .map(function(p, i) { return buildProjectCardHTML(p, pathId, levelIndex, i); })
      .join('');
    /* Each level gets an ID so tab clicks can scroll-to-section */
    return '<div class="level-section" id="level-' + pathId + '-l' + levelIndex + '">'
      + '<div class="level-header">'
      + '<h2 class="level-name">Level ' + level.level + ': ' + level.name + '</h2>'
      + '<p class="level-completion-req">' + level.completionRequirement + '</p>'
      + '</div>'
      + enhHTML
      + cardsHTML
      + '</div>';
  }

  function buildTabsHTML(pathData) {
    return pathData.levels.map(function(level, i) {
      var tabId = 'tab-' + pathData.id + '-l' + i;
      var isActive = i === state.selectedLevel;
      return '<button role="tab"'
        + ' id="' + tabId + '"'
        + ' aria-selected="' + (isActive ? 'true' : 'false') + '"'
        + ' tabindex="' + (isActive ? '0' : '-1') + '"'
        + ' aria-controls="pathways-content-pane"'
        + ' data-level-index="' + i + '">'
        + 'Level ' + level.level
        + '</button>';
    }).join('');
  }

  /* ── render(): rebuilds tabs + paints ALL levels stacked ─ */
  function render() {
    var pathData = PATHWAYS.find(function(p) { return p.id === state.selectedPath; });
    if (!pathData) return;

    document.getElementById('pathways-tab-strip').innerHTML = buildTabsHTML(pathData);

    /* All levels rendered at once — users scroll up/down, tabs are anchor jumps */
    var pane = document.getElementById('pathways-content-pane');
    pane.innerHTML = pathData.levels
      .map(function(level, i) { return buildLevelHTML(level, pathData.id, i); })
      .join('');
  }

  /* ── updateTabActive(): update tab visuals without re-render ── */
  function updateTabActive(levelIndex) {
    Array.from(document.querySelectorAll('#pathways-tab-strip [role="tab"]'))
      .forEach(function(t, i) {
        t.setAttribute('aria-selected', String(i === levelIndex));
        t.setAttribute('tabindex', i === levelIndex ? '0' : '-1');
      });
    state.selectedLevel = levelIndex;
  }

  /* ── Initial render ──────────────────────────────────── */
  render();

  /* ── Populate path selector ──────────────────────────── */
  (function() {
    var sel = document.getElementById('pathways-path-selector');
    sel.innerHTML = PATHWAYS.map(function(p) {
      return '<option value="' + p.id + '"'
        + (p.id === state.selectedPath ? ' selected' : '')
        + '>' + p.name + '</option>';
    }).join('');
  })();

  /* ── Path selector change ────────────────────────────── */
  document.getElementById('pathways-path-selector').addEventListener('change', function(e) {
    if (!PATHWAYS.find(function(p) { return p.id === e.target.value; })) return;
    setState({ selectedPath: e.target.value, selectedLevel: 0 });
    /* Scroll back to top of app on path change */
    document.getElementById('pathways-app').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  /* ── Tab click: highlight tab + scroll to level section ─ */
  document.getElementById('pathways-tab-strip').addEventListener('click', function(e) {
    var tab = e.target.closest('[role="tab"]');
    if (!tab) return;
    var levelIndex = parseInt(tab.dataset.levelIndex, 10);
    var pathData = PATHWAYS.find(function(p) { return p.id === state.selectedPath; });
    if (!pathData || levelIndex < 0 || levelIndex >= pathData.levels.length) return;

    updateTabActive(levelIndex);

    var section = document.getElementById('level-' + state.selectedPath + '-l' + levelIndex);
    if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    var newTab = document.getElementById('tab-' + state.selectedPath + '-l' + levelIndex);
    if (newTab) newTab.focus();
  });

  /* ── Keyboard navigation (W3C APG manual activation) ─── */
  document.getElementById('pathways-tab-strip').addEventListener('keydown', function(e) {
    var tabs = Array.from(document.querySelectorAll('#pathways-tab-strip [role="tab"]'));
    var cur = tabs.indexOf(document.activeElement);
    if (cur === -1) return;
    var next = cur;
    switch (e.key) {
      case 'ArrowRight': next = (cur + 1) % tabs.length; e.preventDefault(); break;
      case 'ArrowLeft':  next = (cur - 1 + tabs.length) % tabs.length; e.preventDefault(); break;
      case 'Home':       next = 0; e.preventDefault(); break;
      case 'End':        next = tabs.length - 1; e.preventDefault(); break;
      case 'Enter':
      case ' ': {
        var li = parseInt(tabs[cur].dataset.levelIndex, 10);
        updateTabActive(li);
        var section = document.getElementById('level-' + state.selectedPath + '-l' + li);
        if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        var at = document.getElementById('tab-' + state.selectedPath + '-l' + li);
        if (at) at.focus();
        e.preventDefault();
        return;
      }
      default: return;
    }
    tabs[next].focus();
    tabs[next].scrollIntoView({ block: 'nearest', inline: 'nearest' });
  });

  /* ── FAB: IntersectionObserver on page viewport ──────── */
  (function() {
    var sentinel = document.getElementById('pathways-sentinel');
    var fab      = document.getElementById('pathways-fab');
    if (!sentinel || !fab) return;

    /* root: null = use browser viewport (FTH page scrolls, not an inner div) */
    var obs = new IntersectionObserver(function(entries) {
      fab.hidden = entries[0].isIntersecting;
    }, { root: null, threshold: 0 });

    obs.observe(sentinel);

    fab.addEventListener('click', function() {
      document.getElementById('pathways-app').scrollIntoView({ behavior: 'smooth' });
    });
  })();
</script>
