    --space-4: 1rem;
    --space-6: 1.5rem;
    --space-8: 2rem;

    font-family: var(--tm-font-body);
    font-size: 16px;
    width: 100%;
    position: relative; /* anchor for absolute-positioned popover and overlay */

  #pathways-app .pa-top-bar {
    background: var(--color-header-bg);
    color: var(--color-header-text);
    padding: var(--space-3) var(--space-4);
    font-family: var(--tm-font-headline);
    font-size: 1.25rem;
    font-weight: 700;
  }

  /* ── Path selector ───────────────────────────────────── */
  #pathways-app .pa-selector-wrapper {
    position: relative;
    background: var(--color-selector-bg);
    padding: var(--space-2) var(--space-4);
  }
  #pathways-app .pa-selector-wrapper::after {
    content: "▾";
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    pointer-events: none;
  }
  #pathways-app .pa-path-selector {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
    border: none;
    color: white;
    font-family: var(--tm-font-headline);
    font-size: 1rem;
    padding: var(--space-2) 0;
    cursor: pointer;
    outline-offset: 2px;
    min-height: 44px;
  }
  #pathways-app .pa-path-selector option {
    background: var(--tm-true-maroon);
    color: white;
  }

  /* ── Tab strip: wraps vertically, no horizontal scroll ── */
  #pathways-app .pa-tab-strip {
    display: flex;
    flex-wrap: wrap;
    background: #f5f5f5;
    border-bottom: 2px solid #ddd;
  }
  #pathways-app [role="tab"] {
    flex: 1 1 auto;
    min-width: 64px;
    white-space: nowrap;
    padding: var(--space-2) var(--space-3);
    min-height: 44px;
    border: none;
    border-bottom: 3px solid transparent;
    background: transparent;
    cursor: pointer;
    font-family: var(--tm-font-headline);
    font-size: 0.875rem;
    color: #555;
    text-align: center;
  }
  #pathways-app [role="tab"][aria-selected="true"] {
    border-bottom-color: var(--color-tab-active);
    color: var(--tm-loyal-blue);
    font-weight: 700;
    background: white;
  }

  /* ── Content area (flows with FTH page scroll) ────────── */
  #pathways-app .pa-content {
    padding: var(--space-4);
    background: #f9f9f9;
  }

  /* ── Level section wrapper (all levels rendered, stacked) */
  #pathways-app .level-section {
    padding-bottom: var(--space-6);
    margin-bottom: var(--space-8);
    border-bottom: 2px solid #e0e0e0;
    scroll-margin-top: var(--space-2); /* offset for tab strip when scrolled to */
  }
  #pathways-app .level-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
  }

    font-weight: 700;
    font-size: 1.25rem;
    color: var(--tm-loyal-blue);
    margin: 0 0 var(--space-1) 0;
  }
  #pathways-app .level-completion-req {
    font-size: 0.9375rem;
    color: #555;
    margin: 0;
  }

  /* ── Enhancement section ─────────────────────────────── */
  #pathways-app .enhancement-section {
    background: white;
    border: 2px solid var(--tm-loyal-blue);

    padding: var(--space-4);
    margin-bottom: var(--space-4);

  #pathways-app .enhancement-title {
    font-family: var(--tm-font-headline);

    color: var(--tm-loyal-blue);
    margin: 0 0 var(--space-2) 0;
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

    font-size: 0.875rem;
    color: #555;
    margin: 0 0 var(--space-2) 0;
  }

    flex-wrap: wrap;

  #pathways-app .project-card {

<!-- ── Modal CSS: <dialog> top-layer — immune to all FTH stacking contexts ──
     The native <dialog> element renders in the browser top layer, which sits
     above every CSS transform/filter/z-index in the page. No FTH ancestor
     can clip or constrain it. ::backdrop covers the full viewport always.  -->
<style>
  /* Centered floating popup — 90% wide on mobile, capped at 480px on desktop */
  #pathways-modal {
    border: none;
    outline: none;
    margin: 0;
    padding: 1.25rem 1.25rem 1.5rem;
    /* inset: unset clears the UA stylesheet's inset:0 before we set our own position */
    position: fixed;
    inset: unset;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 480px;
    max-height: 80vh;
    background: white;
    border-radius: 12px;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    box-sizing: border-box;
    font-family: 'Source Sans 3', 'Segoe UI', Arial, sans-serif;
    font-size: 16px;
  }
  #pathways-modal::backdrop {
    background: rgba(0,0,0,0.55);
  }
  /* Close button */
  #pathways-modal .pa-modal-close-btn {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 32px; height: 32px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 1.25rem;
    color: #666;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    padding: 0;
    line-height: 1;
  }
  #pathways-modal .pa-modal-close-btn:hover { background: #f0f0f0; color: #333; }
  /* Header row */
  #pathways-modal .pa-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
    padding-right: 1.5rem;
    box-sizing: border-box;
  }
  #pathways-modal .pa-modal-title {
    font-family: 'Montserrat', 'Gotham', Arial, sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #004165;
    margin: 0;
  }
  /* Section labels */
  #pathways-modal .pa-modal-section-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin: 0.75rem 0 0.25rem;
  }
  #pathways-modal .pa-modal-time    { font-size: 0.875rem; color: #555; margin: 0.25rem 0 0.5rem; }
  #pathways-modal .pa-modal-purpose { font-size: 0.9375rem; color: #333; line-height: 1.5; margin: 0 0 1rem; }
  /* Download buttons */
  #pathways-modal .pa-modal-btn {
    display: block;
    width: 100%;
    padding: 0.75rem 1rem;
    background: #004165;
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'Montserrat', 'Gotham', Arial, sans-serif;
    font-size: 0.9375rem;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    margin-bottom: 0.5rem;
    box-sizing: border-box;
  }
  #pathways-modal .pa-modal-btn:last-child  { margin-bottom: 0; }
  #pathways-modal .pa-modal-btn:hover       { background: #005a8e; }
  #pathways-modal .pa-modal-btn-generic     { background: #555; }
  #pathways-modal .pa-modal-btn-generic:hover { background: #333; }
  /* Badges inside dialog — pa-badge prefix avoids FTH global .badge conflicts */
  #pathways-modal .pa-badge {
    display: inline-block;
    padding: 0.25rem 0.5rem;
    border-radius: 3px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #pathways-modal .pa-badge-required { background: #004165; color: #ffffff; }
  #pathways-modal .pa-badge-elective { background: #F2DF74; color: #000000; }

  /* ── FAB — viewport-fixed, outside #pathways-app ─────── */
  #pathways-fab {
    position: fixed;
    bottom: calc(1.5rem + env(safe-area-inset-bottom));
    right: 1.5rem;
    width: 3rem;
    height: 3rem;
    border-radius: 50%;
    background: #004165; /* --tm-loyal-blue: literal since outside scoped container */
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    z-index: 9999;
    font-size: 1.5rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  #pathways-fab[hidden] { display: none; }

  /* ── Focus indicator (WCAG) ──────────────────────────── */
  #pathways-app :focus-visible {
    outline: 2px solid var(--tm-loyal-blue);
    outline-offset: 2px;
  }
</style>

<script>
  /* ── Data ────────────────────────────────────────────── */
  var _pd = JSON.parse(document.getElementById('pathways-data').text);
  var PATHWAYS = _pd.paths;

  /* ── Data validator (call validatePathwaysData() in DevTools console) ── */
  window.validatePathwaysData = function validatePathwaysData() {
    var VINTAGE_IDS = ['basic-training', 'communication-series'];
    // en-dash U+2013 between digits, single space, abbreviated "min"
    var TIME_FORMAT_RE = /^\d+–\d+ min$/;
    var SMART_QUOTE_RE = /[“”‘’]/;
    var violations = [];

    function flag(pathName, levelNum, projectName, message) {
      violations.push(
        '[' + pathName + ' > Level ' + levelNum +
        (projectName ? ' > ' + projectName : '') + '] ' + message
      );
    }

    PATHWAYS.forEach(function(path) {
      var isVintage = VINTAGE_IDS.indexOf(path.id) !== -1;

      // Check path.name for smart quotes
      if (SMART_QUOTE_RE.test(path.name)) {
        violations.push('[' + path.name + '] path.name contains smart quotes');
      }

      path.levels.forEach(function(level) {
        var levelNum = level.level;

        // Check level.name for smart quotes
        if (SMART_QUOTE_RE.test(level.name)) {
          flag(path.name, levelNum, null, 'level.name contains smart quotes: "' + level.name + '"');
        }

        // Check level.completionRequirement for smart quotes
        if (level.completionRequirement && SMART_QUOTE_RE.test(level.completionRequirement)) {
          flag(path.name, levelNum, null, 'level.completionRequirement contains smart quotes');
        }

        // Check 4: enhancement field
        if (isVintage) {
          if (level.enhancement !== null && level.enhancement !== undefined) {
            flag(path.name, levelNum, null, 'vintage path must have null enhancement but got non-null');
          }
        } else {
          if (level.enhancement === null || level.enhancement === undefined) {
            flag(path.name, levelNum, null, 'current path must have non-null enhancement but got null/undefined');
          }
        }

        // Check 5: duplicate project names within path+level
        var seen = {};
        level.projects.forEach(function(project) {
          if (seen[project.name]) {
            flag(path.name, levelNum, project.name, 'duplicate project name');
          }
          seen[project.name] = true;

          // Check 1: time format
          if (!TIME_FORMAT_RE.test(project.time)) {
            flag(path.name, levelNum, project.name,
              'invalid time format: "' + project.time + '" (expected "N–N min")');
          }

          // Check 2: type enum
          if (project.type !== 'Required' && project.type !== 'Elective') {
            flag(path.name, levelNum, project.name,
              'invalid type: "' + project.type + '" (must be "Required" or "Elective")');
          }

          // Check 3: smart quotes in project fields
          if (SMART_QUOTE_RE.test(project.name)) {
            flag(path.name, levelNum, project.name, 'project.name contains smart quotes');
          }
          if (SMART_QUOTE_RE.test(project.time)) {
            flag(path.name, levelNum, project.name, 'project.time contains smart quotes');
          }
          if (project.purpose && SMART_QUOTE_RE.test(project.purpose)) {
            flag(path.name, levelNum, project.name, 'project.purpose contains smart quotes');
          }
        });
      });
    });

    if (violations.length === 0) {
      console.log('%c PATHWAYS DATA: PASS ', 'background:#004165;color:#fff;font-weight:bold;font-size:14px;');
      console.log('All ' + PATHWAYS.length + ' paths validated — no violations found.');
    } else {
      console.log('%c PATHWAYS DATA: FAIL ', 'background:#772432;color:#fff;font-weight:bold;font-size:14px;');
      console.log(violations.length + ' violation(s) found:');
      violations.forEach(function(v) { console.warn(v); });
    }
    return violations;
  };

  /* ── State ───────────────────────────────────────────── */
  var state = {
    selectedPath: 'dynamic-leadership',
    selectedLevel: 0
  };

  function setState(updates) {
    Object.assign(state, updates);
    render();
  }

  /* ── Build functions ─────────────────────────────────── */

  function buildProjectCardHTML(project, pathId, levelIndex, projectIndex) {
    var badgeClass = project.type === 'Required' ? 'pa-badge-required' : 'pa-badge-elective';
    var cardId = 'card-' + pathId + '-l' + levelIndex + '-p' + projectIndex;
    /* data-path/level/project let the modal look up the project from PATHWAYS */
    return '<div class="project-card" id="' + cardId + '"'
      + ' role="button" tabindex="0"'
      + ' aria-label="' + project.name + ', tap for details"'
      + ' data-path="' + pathId + '"'
      + ' data-level="' + levelIndex + '"'
      + ' data-project="' + projectIndex + '">'
      + '<div class="project-card-header">'
      + '<h3 class="project-name">' + project.name + '</h3>'
      + '<span class="pa-badge ' + badgeClass + '">' + project.type + '</span>'
      + '</div>'
      + '<p class="project-time">' + project.time + '</p>'
      + '<p class="project-purpose">' + project.purpose + '</p>'
      + '</div>';
  }

  function buildEnhancementHTML(enhancement, pathId, levelIndex) {
    if (!enhancement) return '';
    var rolesHTML = enhancement.roles
      .map(function(r) { return '<li>' + r + '</li>'; })
      .join('');
    var notesHTML = enhancement.notes
      ? '<p class="enhancement-notes">' + enhancement.notes + '</p>'
      : '';
    var titleId = 'enhancement-title-' + pathId + '-l' + levelIndex;
    return '<section class="enhancement-section" aria-labelledby="' + titleId + '">'
      + '<h3 class="enhancement-title" id="' + titleId + '">Enhancement</h3>'
      + '<p class="enhancement-subtitle">Complete these meeting roles during this level:</p>'
      + '<ul class="enhancement-roles">' + rolesHTML + '</ul>'
      + notesHTML
      + '</section>';
  }

  function buildLevelHTML(level, pathId, levelIndex) {
    var enhHTML = buildEnhancementHTML(level.enhancement, pathId, levelIndex);
    var cardsHTML = level.projects
      .map(function(p, i) { return buildProjectCardHTML(p, pathId, levelIndex, i); })
      .join('');
    /* Each level gets an ID so tab clicks can scroll-to-section */
    return '<div class="level-section" id="level-' + pathId + '-l' + levelIndex + '">'
      + '<div class="level-header">'
      + '<h2 class="level-name">Level ' + level.level + ': ' + level.name + '</h2>'
      + '<p class="level-completion-req">' + level.completionRequirement + '</p>'
      + '</div>'
      + enhHTML
      + cardsHTML
      + '</div>';
  }

  function buildTabsHTML(pathData) {
    return pathData.levels.map(function(level, i) {
      var tabId = 'tab-' + pathData.id + '-l' + i;
      var isActive = i === state.selectedLevel;
      return '<button role="tab"'
        + ' id="' + tabId + '"'
        + ' aria-selected="' + (isActive ? 'true' : 'false') + '"'
        + ' tabindex="' + (isActive ? '0' : '-1') + '"'
        + ' aria-controls="pathways-content-pane"'
        + ' data-level-index="' + i + '">'
        + 'Level ' + level.level
        + '</button>';
    }).join('');
  }

  /* ── render(): rebuilds tabs + paints ALL levels stacked ─ */
  function render() {
    var pathData = PATHWAYS.find(function(p) { return p.id === state.selectedPath; });
    if (!pathData) return;

    document.getElementById('pathways-tab-strip').innerHTML = buildTabsHTML(pathData);

    /* All levels rendered at once — users scroll up/down, tabs are anchor jumps */
    var pane = document.getElementById('pathways-content-pane');
    pane.innerHTML = pathData.levels
      .map(function(level, i) { return buildLevelHTML(level, pathData.id, i); })
      .join('');
  }

  /* ── updateTabActive(): update tab visuals without re-render ── */
  function updateTabActive(levelIndex) {
    Array.from(document.querySelectorAll('#pathways-tab-strip [role="tab"]'))
      .forEach(function(t, i) {
        t.setAttribute('aria-selected', String(i === levelIndex));
        t.setAttribute('tabindex', i === levelIndex ? '0' : '-1');
      });
    state.selectedLevel = levelIndex;
  }

  /* ── Initial render ──────────────────────────────────── */
  render();

  /* ── Populate path selector ──────────────────────────── */
  (function() {
    var sel = document.getElementById('pathways-path-selector');
    sel.innerHTML = PATHWAYS.map(function(p) {
      return '<option value="' + p.id + '"'
        + (p.id === state.selectedPath ? ' selected' : '')
        + '>' + p.name + '</option>';
    }).join('');
  })();

  /* ── Path selector change ────────────────────────────── */
  document.getElementById('pathways-path-selector').addEventListener('change', function(e) {
    if (!PATHWAYS.find(function(p) { return p.id === e.target.value; })) return;
    setState({ selectedPath: e.target.value, selectedLevel: 0 });
    /* Scroll back to top of app on path change */
    document.getElementById('pathways-app').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  /* ── Tab click: highlight tab + scroll to level section ─ */
  document.getElementById('pathways-tab-strip').addEventListener('click', function(e) {
    var tab = e.target.closest('[role="tab"]');
    if (!tab) return;
    var levelIndex = parseInt(tab.dataset.levelIndex, 10);
    var pathData = PATHWAYS.find(function(p) { return p.id === state.selectedPath; });
    if (!pathData || levelIndex < 0 || levelIndex >= pathData.levels.length) return;

    updateTabActive(levelIndex);

    var section = document.getElementById('level-' + state.selectedPath + '-l' + levelIndex);
    if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    var newTab = document.getElementById('tab-' + state.selectedPath + '-l' + levelIndex);
    if (newTab) newTab.focus();
  });

  /* ── Keyboard navigation (W3C APG manual activation) ─── */
  document.getElementById('pathways-tab-strip').addEventListener('keydown', function(e) {
    var tabs = Array.from(document.querySelectorAll('#pathways-tab-strip [role="tab"]'));
    var cur = tabs.indexOf(document.activeElement);
    if (cur === -1) return;
    var next = cur;
    switch (e.key) {
      case 'ArrowRight': next = (cur + 1) % tabs.length; e.preventDefault(); break;
      case 'ArrowLeft':  next = (cur - 1 + tabs.length) % tabs.length; e.preventDefault(); break;
      case 'Home':       next = 0; e.preventDefault(); break;
      case 'End':        next = tabs.length - 1; e.preventDefault(); break;
      case 'Enter':
      case ' ': {
        var li = parseInt(tabs[cur].dataset.levelIndex, 10);
        updateTabActive(li);
        var section = document.getElementById('level-' + state.selectedPath + '-l' + li);
        if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        var at = document.getElementById('tab-' + state.selectedPath + '-l' + li);
        if (at) at.focus();
        e.preventDefault();
        return;
      }
      default: return;
    }
    tabs[next].focus();
    tabs[next].scrollIntoView({ block: 'nearest', inline: 'nearest' });
  });

  /* ── Evaluation form URL lookup ─────────────────────── */
  var _B = 'https://westpinestoastmasters.toastmost.org/wp-content/uploads/sites/292/';
  var EVAL_FORMS = {
    'Ice Breaker':
      _B + '2021/04/Ice-Breaker.pdf',
    'Writing a Speech with Purpose':
      _B + '2022/04/Writing-a-Speech-With-Purpose.pdf',
    'Introduction to Vocal Variety and Body Language':
      _B + '2022/04/Introduction-to-Vocal-Variety-and-Body-Language-1.pdf',
    'Evaluation and Feedback': [
      { label: 'First Speech',     url: _B + '2021/04/Evaluation-and-Feedback-First-Speech.pdf' },
      { label: 'Second Speech',    url: _B + '2021/04/Evaluation-and-Feedback-Second-Speech.pdf' },
      { label: 'Evaluator Speech', url: _B + '2021/04/Evaluation-and-Feedback-Evaluator-Speech.pdf' }
    ],
    'Researching and Presenting':
      _B + '2021/04/Researching-and-Presenting.pdf',
    'Understanding Your Communication Style':
      _B + '2021/04/Understanding-Your-Communication-Style.pdf',
    'Effective Body Language':
      _B + '2021/04/Effective-Body-Language.pdf',
    'Connect with Storytelling':
      _B + '2021/04/Connect-with-Storytelling.pdf',
    'Creating Effective Visual Aids':
      _B + '2021/04/Creating-Effective-Visual-Aids.pdf',
    'Inspire Your Audience':
      _B + '2021/04/Inspire-Your-Audience.pdf',
    'Persuasive Influence':
      _B + '2021/04/Persuasive-Speaking.pdf',
    'The Power of Humor':
      _B + '2021/04/The-Power-of-Humor-In-an-Impromptu-Speech.pdf',
    'Leading in Your Volunteer Organization':
      _B + '2021/04/Leading-in-Your-Volunteer-Organization.pdf',
    'Managing a Difficult Audience':
      _B + '2021/04/Manage-a-Difficult-Audience.pdf',
    'High Performance Leadership':
      _B + '2021/04/High-Performance-Leadership.pdf',
    'Prepare to Speak Professionally':
      _B + '2021/04/Prepare-to-Speak-Professionally.pdf'
  };
  var GENERIC_FORM = _B + '2021/04/Generic-Evaluation-Resource.pdf';

  function getEvalButtons(projectName) {
    var form = EVAL_FORMS[projectName];
    if (!form) {
      /* Use generic form for projects without a specific one (e.g. vintage path speeches) */
      return [{ label: 'Download Evaluation Form', url: GENERIC_FORM, generic: true }];
    }
    if (typeof form === 'string') return [{ label: 'Download Evaluation Form', url: form }];
    return form.map(function(f) { return { label: 'Download: ' + f.label, url: f.url }; });
  }

  /* ── Modal: open / close ─────────────────────────────── */
  function openModal(project) {
    var btns = getEvalButtons(project.name);
    var btnsHTML = btns.map(function(b) {
      return '<a href="' + b.url + '" target="_blank" rel="noopener noreferrer"'
        + ' class="pa-modal-btn' + (b.generic ? ' pa-modal-btn-generic' : '') + '">'
        + b.label + '</a>';
    }).join('');

    var badgeClass = project.type === 'Required' ? 'pa-badge-required' : 'pa-badge-elective';
    document.getElementById('pathways-modal-content').innerHTML =
      '<div class="pa-modal-header">'
      + '<h3 class="pa-modal-title" id="pathways-modal-title">' + project.name + '</h3>'
      + '<span class="pa-badge ' + badgeClass + '">' + project.type + '</span>'
      + '</div>'
      + '<p class="pa-modal-time">' + project.time + '</p>'
      + '<p class="pa-modal-section-label">Project Description</p>'
      + '<p class="pa-modal-purpose">' + project.purpose + '</p>'
      + '<p class="pa-modal-section-label">Evaluation Resources</p>'
      + btnsHTML;

    /* <dialog>.showModal() opens in browser top layer — full viewport, above all FTH chrome */
    document.getElementById('pathways-modal').showModal();
  }

  function closeModal() {
    document.getElementById('pathways-modal').close();
  }

  /* X button */
  document.getElementById('pathways-modal-close').addEventListener('click', closeModal);

  /* Click on ::backdrop area closes the dialog.
     Backdrop clicks arrive as click events on the <dialog> itself with target === dialog. */
  document.getElementById('pathways-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  /* Escape key: dialog fires 'cancel' natively; prevent default close then call closeModal */
  document.getElementById('pathways-modal').addEventListener('cancel', function(e) {
    e.preventDefault();
    closeModal();
  });

  /* Project card click + keyboard (Enter/Space) — event delegation on content pane */
  document.getElementById('pathways-content-pane').addEventListener('click', function(e) {
    var card = e.target.closest('.project-card');
    if (!card) return;
    var pathId = card.dataset.path;
    var levelIdx = parseInt(card.dataset.level, 10);
    var projIdx = parseInt(card.dataset.project, 10);
    var pathData = PATHWAYS.find(function(p) { return p.id === pathId; });
    if (!pathData) return;
    openModal(pathData.levels[levelIdx].projects[projIdx]);
  });

  document.getElementById('pathways-content-pane').addEventListener('keydown', function(e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    var card = e.target.closest('.project-card');
    if (!card) return;
    e.preventDefault();
    card.click();
  });

  /* ── FAB: IntersectionObserver on page viewport ──────── */
  (function() {
    var sentinel = document.getElementById('pathways-sentinel');
    var fab      = document.getElementById('pathways-fab');
    if (!sentinel || !fab) return;

    /* root: null = use browser viewport (FTH page scrolls, not an inner div) */
    var obs = new IntersectionObserver(function(entries) {
      fab.hidden = entries[0].isIntersecting;
    }, { root: null, threshold: 0 });

    obs.observe(sentinel);

    fab.addEventListener('click', function() {
      document.getElementById('pathways-app').scrollIntoView({ behavior: 'smooth' });
    });
  })();
</script>
